name: Lerna Bootstrap and Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  bootstrap-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Lerna bootstrap
        run: npx lerna bootstrap --hoist

      - name: Build (tsc -b)
        run: npm run build

      - name: Run tests
        run: npm test
